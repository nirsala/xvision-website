openapi: 3.0.0
info:
  title: Pixel by Keshet API
  description: LED screens and digital signage solutions for Israeli businesses
  version: 1.0.0
  contact:
    name: Pixel by Keshet
    url: https://xvision.co.il
    email: info@pixel.co.il
servers:
  - url: https://xvision.co.il
    description: Main website

paths:
  /:
    get:
      summary: Homepage — LED screens and digital signage for businesses
      description: Main page with services, portfolio, and contact information
      responses:
        '200':
          description: Homepage content

  /products.html:
    get:
      summary: Product catalog — Indoor and outdoor LED screens
      description: Full catalog of LED screen products for businesses
      responses:
        '200':
          description: Product catalog

  /pool.html:
    get:
      summary: Pool and outdoor luxury LED screens
      description: Weatherproof LED screens for pools, villas and outdoor luxury venues
      responses:
        '200':
          description: Pool LED screen information

  /cms.html:
    get:
      summary: CMS software for LED screen management
      description: Cloud-based content management system for managing LED screens remotely
      responses:
        '200':
          description: CMS product information
